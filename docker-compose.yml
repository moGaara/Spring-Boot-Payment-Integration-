services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-demo
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      # Add your env vars here, e.g.:
      # SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/paymentdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Uncomment if you add a DB later:
